async function sGet(range){
  try{
    const sheet = range.split('!')[0];
    const r = range.includes('!') ? range.split('!')[1] : null;
    const params = new URLSearchParams({action:'get', sheet, ...(r && {range:r})});
    const ctrl = new AbortController();
    const t = setTimeout(()=>ctrl.abort(), 8000);
    const res = await fetch(`${SCRIPT_URL}?${params}`, {signal:ctrl.signal});
    clearTimeout(t);
    const data = await res.json();
    return data.values || [];
  } catch(e) { console.warn('sGet failed', e); return null; }
}

async function sAppend(tab, values){
  try{
    const params = new URLSearchParams({
      action: 'append',
      sheet: tab,
      values: JSON.stringify(values[0])
    });
    await fetch(`${SCRIPT_URL}?${params}`);
  } catch(e) { console.warn('sAppend failed', e); }
}

async function sPut(range, values){
  try{
    const sheet = range.split('!')[0];
    const r = range.split('!')[1];
    const params = new URLSearchParams({
      action: 'put',
      sheet,
      range: r,
      values: JSON.stringify(values)
    });
    await fetch(`${SCRIPT_URL}?${params}`);
  } catch(e) { console.warn('sPut failed', e); }
}

// ── MPF Classification ──────────────────────────────────
const LEAD_ACTIVITIES = ['TGL Lead Set Res','TGL Lead Sold Res'];
const PLUMBERS = ['Jesse Mertens','Herbie Windley'];
const COMM_TECHS = ['Nick Scarpa','Javi Vazquez','Ray Lambert','Kyle Freeman','Stuart Akel'];
const CH_TECHS = ['Jay Hall','Steve Gordon','Derrick Hall'];

function classifyMPFLine(name, activity) {
  const isLead = LEAD_ACTIVITIES.includes(activity);
  if (PLUMBERS.includes(name)) return 'plb';
  if (COMM_TECHS.includes(name)) return 'com';
  if (CH_TECHS.includes(name)) return isLead ? 'chi' : 'chs';
  return isLead ? 'ins' : 'svc'; // default MB resi tech
}

function processMPFData(mpfRows) {
  // mpfRows: array of [name, activity, date, job, pay, customer, location, labor]
  const totals = {};
  const dupsMap = {}; // track TGL sold by customer to detect duplicates
  const flags = [];

  mpfRows.forEach(r => {
    const [name, activity, date, job, pay, customer] = r;
    if (!name || !activity || !pay) return;
    const amt = parseFloat(pay) || 0;
    if (amt === 0) return;

    if (!totals[name]) totals[name] = {svc:0,ins:0,plb:0,com:0,chs:0,chi:0};
    const col = classifyMPFLine(name, activity);
    totals[name][col] += amt;

    // Duplicate TGL detection
    if (activity === 'TGL Lead Sold Res') {
      const custKey = name + '|' + String(customer).split(',')[0].trim().toLowerCase();
      if (!dupsMap[custKey]) { dupsMap[custKey] = []; }
      dupsMap[custKey].push({job, amt, customer});
      if (dupsMap[custKey].length > 1) {
        flags.push({
          type: 'dup_tgl',
          emp: name,
          ref: `Job #${job}`,
          title: `Duplicate TGL Stage 2 — ${customer}`,
          detail: `TGL Lead Sold Res appears more than once for ${customer}. Jobs: ${dupsMap[custKey].map(x=>'#'+x.job).join(', ')}. One is likely a duplicate payroll entry. Verify and reverse the incorrect one.`,
          sev: 'red'
        });
      }
    }

    // Stage 2 without Stage 1 detection
    if (activity === 'TGL Lead Sold Res') {
      const custKey2 = name + '|sold|' + String(customer).split(',')[0].trim().toLowerCase();
      dupsMap[custKey2] = true;
    }
  });

  // Check for S2 without S1
  mpfRows.forEach(r => {
    const [name, activity, date, job, pay, customer] = r;
    if (activity !== 'TGL Lead Set Res') return;
    const custKey = name + '|sold|' + String(customer).split(',')[0].trim().toLowerCase();
    // S1 exists — good, remove S2 orphan concern
    delete dupsMap[custKey];
  });

  return {totals, flags};
}

// ── Utils ────────────────────────────────────────────────
function fp(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2}).format(n||0);}
function f$(n){if(!n&&n!==0)return'—';if(n===0)return'<span class="zero">—</span>';return fp(n);}
function toast(msg,dur=3200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),dur);}
function empTot(e){return(e.svc||0)+(e.ins||0)+(e.plb||0)+(e.com||0)+(e.chs||0)+(e.chi||0);}
function stevenBonus(){return S.revenue.filter(r=>r.se&&r.actual&&r.actual>=r.goal).length*350;}

// ── Load from Sheets ──────────────────────────────────────
async function loadSheets(){
  const [subs,rev,flags,mans]=await Promise.all([
    sGet('submissions!A2:F50'),
    sGet('revenue_actuals!A2:D50'),
    sGet('flags!A2:N500'),
    sGet('manual_adds!A2:I500'),
  ]);
  if(subs)subs.forEach(r=>{
    if(r[0]===MONTH&&r[1]){const m=r[1].toLowerCase();if(m in S.submissions){S.submissions[m]=r[2]||'not_started';S.pushback[m]=(r[4]==='pushed_back'&&r[5])?r[5]:null;}}
  });
  if(rev)rev.forEach(r=>{if(r[0]===MONTH){const row=S.revenue.find(x=>x.dept===r[1]);if(row&&r[3])row.actual=parseFloat(r[3]);}});
  if(flags)flags.forEach(r=>{
    if(r[0]!==MONTH||!r[1]||!r[2])return;
    const mgr=r[1];if(!S.flags[mgr])return;
    const fl=S.flags[mgr].find(f=>f.id===r[2]);
    if(fl){fl.disp=r[9]||'';fl.note=r[10]||'';fl.resolved=r[11]==='true';}
  });
  if(mans)mans.forEach(r=>{if(r[0]===MONTH&&r[1]&&S.manuals[r[1]])S.manuals[r[1]].push({name:r[2],reason:r[3],amount:parseFloat(r[4])||0,dept:r[5]});});
}

const DCOLS=['MB Resi Svc','MB Install Resi','MB Plumbing','MB Svc Comm','CH Service','CH Install'];
function buildRows(){
  // Build a map keyed by employee name so resolved flags roll up
  const empMap = {};

  function addToEmp(name, vals, detail, note) {
    if (!empMap[name]) empMap[name] = {name, vals:[0,0,0,0,0,0], details:[], total:0};
    vals.forEach((v,i) => empMap[name].vals[i] += (v||0));
    empMap[name].total = empMap[name].vals.reduce((a,b)=>a+b,0);
    if (detail) empMap[name].details.push(detail);
  }

  // Base employee spiffs from MPF
  [...S.emps.steven,...S.emps.caleb].forEach(e=>{
    const mgr=S.emps.steven.includes(e)?'steven':'caleb';
    const manAmt=(S.manuals[mgr]||[]).filter(m=>m.name===e.name).reduce((a,m)=>a+m.amount,0);
    const vals=[e.svc||0,e.ins||0,e.plb||0,e.com||0,e.chs||0,e.chi||0];
    const baseTotal=vals.reduce((a,b)=>a+b,0);
    if(baseTotal>0||manAmt>0){
      addToEmp(e.name, vals, null, '');
      if(manAmt>0){
        const mVals=[0,0,0,0,0,0];
        (S.manuals[mgr]||[]).filter(m=>m.name===e.name).forEach(m=>{
          addToEmp(e.name, [0,0,0,0,0,0], `Manual add: ${m.reason} — ${fp(m.amount)} (${m.dept})`, '');
        });
      }
    }
  });

  // Roll resolved flags into the employee's row
  [...S.flags.steven,...S.flags.caleb].filter(f=>f.resolved&&f.disp==='Pay this month').forEach(f=>{
    // Determine correct column based on flag content
    const isLead = f.title.toLowerCase().includes('lead') || f.title.toLowerCase().includes('tgl');
    const isCH = f.emp==='Steve Gordon'||f.emp==='Jay Hall';
    const col = isLead ? (isCH?5:1) : (isCH?4:0);
    const v=[0,0,0,0,0,0]; v[col]=25;
    addToEmp(f.emp, v, `Resolved flag: ${f.title} — ${fp(25)}`, '');
  });

  // Commercial lead spiffs — roll into tech's row
  S.commLeads.filter(l=>l.status==='Sold & Completed'&&l.payMonth===MONTH).forEach(l=>{
    addToEmp(l.tech, [0,0,0,l.spiff,0,0], `Commercial lead: ${l.customer} (Job ${l.job}) — ${fp(l.spiff)}`, '');
  });

  // Jay commission — roll into Jay's row
  if(S.jayJobs.length>0){
    let jayComm=0;
    const jayDetails=[];
    S.jayJobs.forEach(j=>{
      const base=j.subtotal-j.accDeduct;
      let amt=0;
      if(j.type==='Commission sale (2%)'){amt=base*0.02;}
      else if(j.type==='Lead spiff Stage 1+2 ($100)'){amt=100;}
      else if(j.type==='Lead spiff Stage 1 only ($25)'){amt=25;}
      else if(j.type==='Lead spiff Stage 2 only ($75)'){amt=75;}
      jayComm+=amt;
      jayDetails.push(`Job ${j.job}: ${j.type} — ${fp(amt)}`);
    });
    if(jayComm>0){
      addToEmp('Jay Hall',[0,0,0,0,0,jayComm], `Equipment commission: ${jayDetails.join('; ')}`, '');
    }
  }

  // Steven performance bonus
  S.revenue.filter(r=>r.se&&r.actual&&r.actual>=r.goal).forEach(r=>{
    const col=r.dept.includes('Residential')?0:r.dept.includes('Commercial')?3:r.dept.includes('Plumbing')?2:0;
    const v=[0,0,0,0,0,0];v[col]=350;
    addToEmp('Steven (performance bonus)',v,`Performance bonus: ${r.dept} goal met — $350`,'');
  });

  // Approved bonuses
  S.bonuses.filter(b=>b.approved).forEach(b=>{
    addToEmp(b.name,[0,0,0,0,0,0],`${b.type}: ${fp(b.amount)}`,'');
    if(!empMap[b.name]) empMap[b.name]={name:b.name,vals:[0,0,0,0,0,0],details:[],total:0};
    empMap[b.name].total+=b.amount;
    empMap[b.name].bonusAmt=(empMap[b.name].bonusAmt||0)+b.amount;
    empMap[b.name].bonusNote=b.type;
  });

  // Office membership spiffs
  S.officeMems.forEach(m=>{
    const v=[0,0,0,0,0,0];
    if(m.dept==='MB Residential Service')v[0]=m.total;
    else if(m.dept==='MB Plumbing')v[2]=m.total;
    else if(m.dept==='CH Service')v[4]=m.total;
    if(m.total>0) addToEmp(m.name,v,`Membership spiffs: ${fp(m.total)}`,'');
  });

  return Object.values(empMap).filter(r=>r.total>0);
}
function grandTotal(){return buildRows().reduce((a,r)=>a+r.total+(r.bonusAmt||0),0);}

    ${adds.length?`<div style="margin-top:.75rem">${adds.map((a,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;font-size:.78rem;padding:5px 0;border-top:1px solid #F0EDE8"><span>${a.name} — ${a.reason} <span style="color:#999">(${a.dept})</span></span><span style="display:flex;gap:8px;align-items:center"><strong style="font-family:'DM Mono',monospace">${fp(a.amount)}</strong><button class="btn bsm" onclick="removeManual('${mgr}',${i})">Remove</button></span></div>`).join('')}</div>`:''}
  </div>`;
}
async function addManual(mgr){
  const name=document.getElementById('m-emp').value;
  const reason=document.getElementById('m-rsn').value.trim();
  const amount=parseFloat(document.getElementById('m-amt').value)||0;
  const dept=document.getElementById('m-dept').value;
  if(!reason||amount<=0){toast('Please enter a reason and amount.');return;}
  S.manuals[mgr].push({name,reason,amount,dept});
  await sAppend('manual_adds',[[MONTH,mgr,name,reason,amount,dept,S.role,new Date().toISOString(),'pending']]);
  toast('Manual spiff added');rTeam(mgr);
}
function removeManual(mgr,i){S.manuals[mgr].splice(i,1);rTeam(mgr);}
async function submitWorkbook(){
  const mgr=S.role;
  if(S.flags[mgr].filter(f=>!f.resolved).length>0)return;
  S.submissions[mgr]='submitted';
  await sAppend('submissions',[[MONTH,mgr,'submitted',new Date().toISOString(),'','']]);
  toast('Submitted to Billy');rTeam(mgr);
}

// ── FLAGS ────────────────────────────────────────────────

  ${active.length?`

      </div>

        <span style="font-weight:600;font-family:'DM Mono',monospace">\$${l.spiff}</span>

      </div>

  <div class="card">

    ${S.commLeads.filter(l=>!l.paid&&l.status!=='Did Not Sell — Close Lead').map((l,i)=>`
    <div style="padding:8px 0;border-bottom:1px solid #F0EDE8;display:grid;grid-template-columns:1fr 180px 100px;gap:8px;align-items:center;font-size:.82rem">
      <div>
        <div style="font-weight:500">${l.tech} — ${l.customer}</div>

        onchange="updateCommLead('${l.id}',this.value)">
        <option ${l.status==='Pending'?'selected':''}>Pending</option>
        <option ${l.status==='Sold — Install In Progress'?'selected':''}>Sold — Install In Progress</option>
        <option ${l.status==='Sold & Completed'?'selected':''}>Sold & Completed</option>
        <option ${l.status==='Did Not Sell'?'selected':''}>Did Not Sell — Close Lead</option>
      </select>
      ${l.prevStatus?`<button onclick="undoCommLead('${l.id}')" style="font-size:.65rem;padding:2px 8px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;color:#666;white-space:nowrap">Undo</button>`:''}
      </div>
      <span style="font-size:.7rem;color:#999;text-align:right">${l.status==='Sold & Completed'?'<span class="badge bok">\$100 due</span>':''}</span>
    </div>`).join('')}
  </div>

  <div class="card">
    <div class="ctitle">Add new commercial lead</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 130px auto;gap:8px;align-items:end">
      <div><label style="font-size:.7rem;color:#999;display:block;margin-bottom:3px">Tech</label>
        <select id="cl-tech" style="width:100%;font-size:.8rem;padding:6px 8px;border:1px solid #ddd;border-radius:7px;background:#fff;font-family:inherit">
          ${['Nick Scarpa','Javi Vazquez','Ray Lambert','Kyle Freeman','Stuart Akel'].map(t=>`<option>${t}</option>`).join('')}
        </select></div>
      <div><label style="font-size:.7rem;color:#999;display:block;margin-bottom:3px">Customer / Business</label>
        <input type="text" id="cl-cust" placeholder="e.g. Ocean Lakes Resort" style="width:100%;font-size:.8rem;padding:6px 8px;border:1px solid #ddd;border-radius:7px;background:#fff;font-family:inherit"></div>
      <div><label style="font-size:.7rem;color:#999;display:block;margin-bottom:3px">Job Number</label>
        <input type="text" id="cl-job" placeholder="e.g. 158354782" style="width:100%;font-size:.8rem;padding:6px 8px;border:1px solid #ddd;border-radius:7px;background:#fff;font-family:inherit"></div>

function updateCommLead(id, status){
  const lead=S.commLeads.find(l=>l.id===id);
  if(!lead) return;
  lead.prevStatus = lead.status; // save for undo
  lead.status=status;
  if(status==='Sold & Completed'){
    lead.spiff=100; lead.payMonth=MONTH;
    toast(`\$100 spiff due to ${lead.tech} — will appear in accounting output.`);
  }
  if(status==='Did Not Sell — Close Lead'){lead.spiff=0;}
  rCommLeads();
}

function undoCommLead(id){
  const lead=S.commLeads.find(l=>l.id===id);
  if(!lead||!lead.prevStatus) return;
  lead.status=lead.prevStatus;
  lead.prevStatus=null;
  if(lead.status!=='Sold & Completed'){lead.spiff=0;lead.payMonth='';}
  toast('Status reverted.');
  rCommLeads();
}

function addCommLead(){
  const tech=document.getElementById('cl-tech').value;
  const cust=document.getElementById('cl-cust').value.trim();
  const job=document.getElementById('cl-job').value.trim();
  if(!cust||!job){toast('Please enter customer and job number.');return;}
  const id='cl'+Date.now();
  S.commLeads.push({id,month:MONTH,tech,job,customer:cust,status:'Pending',spiff:0,payMonth:'',paid:false});
  document.getElementById('cl-cust').value='';
  document.getElementById('cl-job').value='';
  sAppend('flags',[[MONTH,'steven',id,'info','info',tech,job,'',cust,'Pending','','false','']]);
  toast('Commercial lead added to log.');
  rCommLeads();
}

function rFlags(mgr){
  const v=vw();const flags=S.flags[mgr];
  const open=flags.filter(f=>!f.resolved).length;
  const cf=S.carryForward.filter(c=>c.emp&&(S.emps[mgr]||[]).find(e=>e.name===c.emp));
  v.innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
    <div style="font-size:1rem;font-weight:600">Flags to resolve</div>
    <span class="badge bwarn">${open} open</span>
  </div>
  ${cf.length?`<div class="card" style="border-left:3px solid #3b82f6;margin-bottom:1rem">
    <div class="ctitle">Carried forward from ${PREV_M}</div>
    ${cf.map(c=>`<div class="ri"><div class="ril"><span class="cf-badge">Carry forward</span><span style="font-size:.82rem;margin-top:3px;font-weight:500">${c.emp} — ${c.type}</span><span class="risub">${c.ref} · ${c.reason}</span></div><div style="display:flex;gap:8px;align-items:center"><span style="font-weight:600;font-family:'DM Mono',monospace">${fp(c.amount)}</span><span class="badge bwarn">Cross-ref MPF — dup risk</span></div></div>`).join('')}
    <div style="font-size:.7rem;color:#999;margin-top:.5rem">⚠ Verify these are not also being paid by this month's Master Pay File before including.</div>
  </div>`:''}
  ${flags.map(f=>`<div class="fb ${f.sev} ${f.resolved?'done':''}">
    <div class="fmeta">${f.emp} · ${f.ref}</div>
    <div class="ftitle">${f.title}</div>
    ${f.resolved?`
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="badge ${f.disp==='Pay this month'?'bok':f.disp==='Pay next month'?'binfo':'bdanger'}">${f.disp}</span>
        ${f.note?`<span style="font-size:.72rem;color:#999">${f.note}</span>`:''}
        <button onclick="undoFlag('${mgr}','${f.id}')" style="font-size:.65rem;padding:2px 8px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;color:#666">Undo</button>
      </div>`:`
      <div class="fdetail">${f.detail}</div>
      <div class="factions">
        <select onchange="S.flags['${mgr}'].find(x=>x.id==='${f.id}').disp=this.value">
          <option value="">Select action…</option>
          <option>Pay this month</option>
          <option>Pay next month</option>
          <option>Not paid</option>
          <option>Add manual spiff below</option>
        </select>
        <textarea placeholder="Note — required for Not paid…" onchange="S.flags['${mgr}'].find(x=>x.id==='${f.id}').note=this.value"></textarea>
        <button class="btn btnp bsm" onclick="resolveFlag('${mgr}','${f.id}')">Resolve</button>
      </div>`}
  </div>`).join('')}
  ${!flags.length?`<div class="card" style="text-align:center;color:#999;font-size:.85rem;padding:2rem">No flags for your team this month.</div>`:''}`;
}
function renderJayJobs(){
  const list=document.getElementById('jay-jobs-list');
  const totEl=document.getElementById('jay-total');
  if(!list||!totEl)return;
  let commission=0;
  const rows=S.jayJobs.map((j,i)=>{
    let amt=0;
    const base=j.subtotal-j.accDeduct;
    if(j.type==='Commission sale (2%)'){amt=base*0.02;}
    else if(j.type==='Lead spiff Stage 1+2 ($100)'){amt=100;}
    else if(j.type==='Lead spiff Stage 1 only ($25)'){amt=25;}
    else if(j.type==='Lead spiff Stage 2 only ($75)'){amt=75;}
    commission+=amt;
    return `<div style="display:flex;justify-content:space-between;align-items:flex-start;font-size:.78rem;padding:6px 0;border-top:1px solid #F0EDE8">
      <div>
        <span style="font-family:'DM Mono',monospace;color:#999">Job ${j.job}</span>
        <span style="margin-left:8px">${j.type}</span>
        ${j.accDeduct>0?`<span style="font-size:.7rem;color:#999;margin-left:6px">Subtotal ${fp(j.subtotal)} − accessories ${fp(j.accDeduct)} = base ${fp(base)}</span>`:`<span style="font-size:.7rem;color:#999;margin-left:6px">Subtotal ${fp(j.subtotal)}</span>`}
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <strong style="font-family:'DM Mono',monospace">${fp(amt)}</strong>
        <button class="btn bsm" onclick="removeJayJob(${i})">Remove</button>
      </div>
    </div>`;
  }).join('');
  list.innerHTML=rows;
  // Update Jay's commission in emps
  const jay=S.emps.caleb.find(e=>e.name==='Jay Hall');
  if(jay){jay.jayCommission=commission;}
  totEl.innerHTML=`<span style="font-size:.82rem">Jay Hall commission total: <strong style="font-family:'DM Mono',monospace">${fp(commission)}</strong> &nbsp;·&nbsp; Plus service spiffs: <strong style="font-family:'DM Mono',monospace">${fp(jay?jay.chs:0)}</strong> &nbsp;·&nbsp; <strong>Grand total: ${fp(commission+(jay?jay.chs:0))}</strong></span>`;
}

function flagSpiffLine(mgr,empName,idx){
  const reasonId=`flag-reason-${mgr}-${empName.replace(/\s/g,'_')}-${idx}`;
  const reasonEl=document.getElementById(reasonId);
  const reason=reasonEl?reasonEl.value.trim():'';
  if(!reason){toast('Please enter a reason before marking incorrect.');return;}
  const detail=(S.spiffDetail[mgr]||{})[empName];
  if(!detail||!detail[idx])return;
  detail[idx].flagged=true;
  detail[idx].flagNote=reason;
  // Subtract from employee total
  const emp=S.emps[mgr].find(e=>e.name===empName);
  if(emp){
    const col=detail[idx].type&&detail[idx].type.includes('TGL')?'chi':'chs';
    if(mgr==='steven') emp.svc=Math.max(0,(emp.svc||0)-detail[idx].spiff);
    else emp.chs=Math.max(0,(emp.chs||0)-detail[idx].spiff);
  }
  toast('Line flagged — excluded from totals. Noted for payroll reversal.');
  rTeam(mgr);
}

function unflagSpiffLine(mgr,empName,idx){
  const detail=(S.spiffDetail[mgr]||{})[empName];
  if(!detail||!detail[idx])return;
  const wasSpiff=detail[idx].spiff;
  detail[idx].flagged=false;
  detail[idx].flagNote='';
  // Add back to employee total
  const emp=S.emps[mgr].find(e=>e.name===empName);
  if(emp){
    if(mgr==='steven') emp.svc=(emp.svc||0)+wasSpiff;
    else emp.chs=(emp.chs||0)+wasSpiff;
  }
  toast('Flag removed — spiff restored to total.');
  rTeam(mgr);
}

function addJayJob(){
  const job=document.getElementById('jay-job').value.trim();
  const sub=parseFloat(document.getElementById('jay-sub').value)||0;
  const acc=parseFloat(document.getElementById('jay-acc').value)||0;
  const type=document.getElementById('jay-type').value;
  if(!job||sub<=0){toast('Please enter a job number and subtotal.');return;}
  S.jayJobs.push({job,subtotal:sub,accDeduct:acc,type});
  document.getElementById('jay-job').value='';
  document.getElementById('jay-sub').value='';
  document.getElementById('jay-acc').value='';
  renderJayJobs();
  toast('Job added');
}

function removeJayJob(i){S.jayJobs.splice(i,1);renderJayJobs();}

function renderAfterUndo(mgr){
  // Re-render whichever view is active
  if(document.querySelector('.nb.on')&&document.querySelector('.nb.on').dataset.v==='review') rReview();
  else rOverview();
}

async function undoFlag(mgr,id){
  const f=S.flags[mgr].find(x=>x.id===id);
  if(!f) return;
  f.resolved=false; f.disp=''; f.note='';
  // Write undo to sheet — new row overrides previous resolution
  await sAppend('flags',[[MONTH,mgr,id,f.sev,f.sev,f.emp,f.ref,'',f.detail,'','','false',new Date().toISOString()]]);
  toast('Flag re-opened.');
  rFlags(mgr);
  // Update submit button
  const btn=document.querySelector('button[onclick="submitWorkbook()"]');
  if(btn){btn.textContent=`1 flag needs resolution`;btn.style.background='#ccc';btn.style.cursor='not-allowed';}
}

async function resolveFlag(mgr,id){
  const f=S.flags[mgr].find(x=>x.id===id);
  if(!f||!f.disp){toast('Please select an action first.');return;}
  if(f.disp==='Not paid'&&!f.note.trim()){toast("Please add a note explaining why.");return;}
  f.resolved=true;
  await sAppend('flags',[[MONTH,mgr,id,f.sev,f.sev,f.emp,f.ref,'',f.detail,f.disp,f.note,'true',new Date().toISOString()]]);
  if(f.disp==='Pay next month')
    await sAppend('carry_forward',[[MONTH,NEXT_M,f.emp,f.ref,'',f.title,'','',f.note||f.detail,'pending','']]);
  toast(f.disp==='Pay next month'?'Carried forward to June.':'Flag resolved.');
  rFlags(mgr);
  const btn=document.querySelector('button[onclick="submitWorkbook()"]');
  if(btn&&S.flags[mgr].filter(x=>!x.resolved).length===0){btn.textContent='Submit to Billy';btn.style.background='#1a1a1a';btn.style.cursor='pointer';}
}
