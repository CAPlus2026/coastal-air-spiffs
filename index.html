/* ── Sheets API ── */
async function sGet(range) {
  try {
    const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?key=${API_KEY}`);
    if (!r.ok) return null;
    return (await r.json()).values || [];
  } catch { return null; }
}
async function sPut(range, values) {
  try {
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW&key=${API_KEY}`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({range, majorDimension:'ROWS', values})
    });
  } catch(e) { console.error('sPut error', e); }
}
async function sAppend(tab, values) {
  try {
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(tab+'!A1')}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS&key=${API_KEY}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({majorDimension:'ROWS', values})
    });
  } catch(e) { console.error('sAppend error', e); }
}

/* ── Utils ── */
function fp(n){ return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2}).format(n||0); }
function f$(n){ if(!n&&n!==0) return '—'; if(n===0) return '<span class="zero">—</span>'; return fp(n); }
function toast(msg,dur=3200){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),dur);
}
function empTot(e){ return (e.svc||0)+(e.ins||0)+(e.plb||0)+(e.com||0)+(e.chs||0)+(e.chi||0); }
function stevenBonus(){ return S.revenue.filter(r=>r.se&&r.actual&&r.actual>=r.goal).length*350; }

/* ── Load from Sheets ── */
async function loadSheets(){
  const [subs,rev,flags,mans] = await Promise.all([
    sGet('submissions!A2:F50'),
    sGet('revenue_actuals!A2:D50'),
    sGet('flags!A2:N500'),
    sGet('manual_adds!A2:I500'),
  ]);
  if(subs) subs.forEach(r=>{
    if(r[0]===MONTH&&r[1]){
      const m=r[1].toLowerCase();
      if(m in S.submissions){ S.submissions[m]=r[2]||'not_started'; S.pushback[m]=(r[4]==='pushed_back'&&r[5])?r[5]:null; }
    }
  });
  if(rev) rev.forEach(r=>{ if(r[0]===MONTH){ const row=S.revenue.find(x=>x.dept===r[1]); if(row&&r[3]) row.actual=parseFloat(r[3]); } });
  if(flags) flags.forEach(r=>{
    if(r[0]!==MONTH||!r[1]||!r[2]) return;
    const mgr=r[1]; if(!S.flags[mgr]) return;
    const fl=S.flags[mgr].find(f=>f.id===r[2]);
    if(fl){ fl.disp=r[9]||''; fl.note=r[10]||''; fl.resolved=r[11]==='true'; }
  });
  if(mans) mans.forEach(r=>{ if(r[0]===MONTH&&r[1]&&S.manuals[r[1]]) S.manuals[r[1]].push({name:r[2],reason:r[3],amount:parseFloat(r[4])||0,dept:r[5]}); });
}

function setRole(role){

    b.onclick=()=>show(v.id); nav.appendChild(b);
  });
  show(NAVS[role][0].id);
}
function show(id){
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('on',b.dataset.v===id));
  const views=document.getElementById('views');
  views.innerHTML='';
  const d=document.createElement('div'); d.className='view'; views.appendChild(d);

const DCOLS=['MB Resi Svc','MB Install Resi','MB Plumbing','MB Svc Comm','CH Service','CH Install'];
function buildRows(){
  const rows=[];
  [...S.emps.steven,...S.emps.caleb].forEach(e=>{
    const mgr=S.emps.steven.includes(e)?'steven':'caleb';
    const manAmt=(S.manuals[mgr]||[]).filter(m=>m.name===e.name).reduce((a,m)=>a+m.amount,0);
    const vals=[e.svc||0,e.ins||0,e.plb||0,e.com||0,e.chs||0,e.chi||0];
    const total=vals.reduce((a,b)=>a+b,0)+manAmt;
    if(total>0) rows.push({name:e.name,vals,manAmt,total,note:''});
  });
  [...S.flags.steven,...S.flags.caleb].filter(f=>f.resolved&&f.disp==='Pay this month').forEach(f=>{
    rows.push({name:f.emp,vals:[25,0,0,0,0,0],manAmt:0,total:25,note:`Flag: ${f.title}`});
  });
  S.revenue.filter(r=>r.se&&r.actual&&r.actual>=r.goal).forEach(r=>{
    const col=r.dept.includes('Residential')?0:r.dept.includes('Commercial')?3:r.dept.includes('Plumbing')?2:0;
    const v=[0,0,0,0,0,0]; v[col]=350;
    rows.push({name:'Steven',vals:v,manAmt:0,total:350,note:r.dept+' goal met'});
  });
  S.bonuses.filter(b=>b.approved).forEach(b=>rows.push({name:b.name,vals:[0,0,0,0,0,0],manAmt:0,total:b.amount,note:b.type}));
  // Office membership spiffs
  S.officeMems.forEach(m=>{
    const v=[0,0,0,0,0,0];
    if(m.dept==='MB Residential Service') v[0]=m.total;
    else if(m.dept==='MB Plumbing') v[2]=m.total;
    else if(m.dept==='CH Service') v[4]=m.total;
    if(m.total>0) rows.push({name:m.name,vals:v,manAmt:0,total:m.total,note:'Membership spiffs'});
  });
  return rows;
}

async function resolveFlag(mgr,id){
  const f=S.flags[mgr].find(x=>x.id===id);
  if(!f||!f.disp){toast('Please select an action first.');return;}
  if(f.disp==='Not paid'&&!f.note.trim()){toast("Please add a note explaining why this spiff isn't being paid.");return;}
  f.resolved=true;
  await sAppend('flags',[[MONTH,mgr,id,f.sev,f.sev,f.emp,f.ref,'',f.detail,f.disp,f.note,'true',new Date().toISOString()]]);
  if(f.disp==='Pay next month')
    await sAppend('carry_forward',[[MONTH,NEXT_M,f.emp,f.ref,'',f.title,'','',f.note||f.detail,'pending','']]);
  toast(f.disp==='Pay next month'?'Carried forward to June.':'Flag resolved and saved.');
  rFlags(mgr);
  const ob=document.querySelector('button[onclick="submitWorkbook()"]');
  if(ob){ const oc=S.flags[mgr].filter(x=>!x.resolved).length; if(oc===0){ob.textContent='Submit to Billy';ob.style.background='#1a1a1a';ob.style.cursor='pointer';} }
}

/* ── Boot ── */
/* ── PIN Protection ── */
const PINS = { '0311': 'billy', '9779': 'steven', '1001': 'caleb' };
const PIN_LABELS = { billy:'Billy (Owner)', steven:'Steven — Myrtle Beach', caleb:'Caleb — Charleston' };

function showPinScreen() {
  document.getElementById('nav').style.display='none';
  document.getElementById('views').innerHTML=`
    <div style="max-width:320px;margin:4rem auto;text-align:center">
      <div style="font-size:1rem;font-weight:600;margin-bottom:.5rem">Enter your access PIN</div>
      <div style="font-size:.8rem;color:#999;margin-bottom:1.5rem">Contact Billy if you need your PIN</div>
      <input type="password" id="pin-input" maxlength="4" placeholder="••••"
        style="width:100%;font-size:1.5rem;text-align:center;padding:.75rem;border:1px solid #ddd;border-radius:10px;letter-spacing:.5rem;font-family:'DM Mono',monospace;background:#fff;color:#1a1a1a"
        onkeyup="checkPin(this.value)">
      <div id="pin-error" style="color:#991b1b;font-size:.78rem;margin-top:.75rem;min-height:1.2rem"></div>
    </div>`;
}

function checkPin(val) {
  if(val.length < 4) { document.getElementById('pin-error').textContent=''; return; }
  const role = PINS[val];
  if(role) {
    document.getElementById('role-sel').value = role==='billy'?'Billy (Owner)':role==='steven'?'Steven — Myrtle Beach':'Caleb — Charleston';
    document.getElementById('role-sel').style.display = role==='billy'?'':'none';
    document.getElementById('nav').style.display='';
    setRole(role);
  } else {
    document.getElementById('pin-error').textContent='Incorrect PIN — try again';
    document.getElementById('pin-input').value='';
  }
}

(async function init(){
  const badge=document.getElementById('conn-badge');
  document.getElementById('month-label').textContent=`${MONTH} · Processing window open`;
  try {
    const cfg=await sGet('app_config!A1:B10');
    if(cfg) cfg.forEach(row=>{ if(row[0]==='api_key'&&row[1]) API_KEY=row[1]; });
    if(!API_KEY) throw new Error('No API key in app_config tab');
    await loadSheets();
    badge.textContent='Connected'; badge.className='conn conn-ok'; CONN_OK=true;
  } catch(e){
    badge.textContent='Connection failed'; badge.className='conn conn-err';
    console.error(e);
  }
  document.getElementById('role-sel').style.display='none';
  showPinScreen();
})();
</script>
