async function sGet(range){
  try{
    const sheet = range.split('!')[0];
    const r = range.includes('!') ? range.split('!')[1] : null;
    const params = new URLSearchParams({action:'get', sheet, ...(r && {range:r})});
    const ctrl = new AbortController();
    const t = setTimeout(()=>ctrl.abort(), 8000);
    const res = await fetch(`${SCRIPT_URL}?${params}`, {signal:ctrl.signal});
    clearTimeout(t);
    const data = await res.json();
    return data.values || [];
  } catch(e) { console.warn('sGet failed', e); return null; }
}

async function sAppend(tab, values){
  try{
    const params = new URLSearchParams({
      action: 'append',
      sheet: tab,
      values: JSON.stringify(values[0])
    });
    await fetch(`${SCRIPT_URL}?${params}`);
  } catch(e) { console.warn('sAppend failed', e); }
}

async function sPut(range, values){
  try{
    const sheet = range.split('!')[0];
    const r = range.split('!')[1];
    const params = new URLSearchParams({
      action: 'put',
      sheet,
      range: r,
      values: JSON.stringify(values)
    });
    await fetch(`${SCRIPT_URL}?${params}`);
  } catch(e) { console.warn('sPut failed', e); }
}

const PINS={'0311':'billy','9779':'steven','1001':'caleb','2200':'jenny'};

function chkPin(v){
  if(v.length<4){document.getElementById('pin-err').textContent='';return;}
  const role=PINS[v];
  if(role){
    S.role=role;
    const rs=document.getElementById('role-sel');
    rs.value=role;
    if(role==='billy') rs.style.display='';
    setRole(role);
  }else{
    document.getElementById('pin-err').textContent='Incorrect PIN — try again';
    document.getElementById('pin-in').value='';
  }
}

// ── MPF Classification ──────────────────────────────────
const LEAD_ACTIVITIES = ['TGL Lead Set Res','TGL Lead Sold Res'];
const PLUMBERS = ['Jesse Mertens','Herbie Windley'];
const COMM_TECHS = ['Nick Scarpa','Javi Vazquez','Ray Lambert','Kyle Freeman','Stuart Akel'];
const CH_TECHS = ['Jay Hall','Steve Gordon'];

function classifyMPFLine(name, activity) {
  const isLead = LEAD_ACTIVITIES.includes(activity);
  if (PLUMBERS.includes(name)) return 'plb';
  if (COMM_TECHS.includes(name)) return 'com';
  if (CH_TECHS.includes(name)) return isLead ? 'chi' : 'chs';
  return isLead ? 'ins' : 'svc'; // default MB resi tech
}

function processMPFData(mpfRows) {
  // mpfRows: array of [name, activity, date, job, pay, customer, location, labor]
  const totals = {};
  const dupsMap = {}; // track TGL sold by customer to detect duplicates
  const flags = [];

  mpfRows.forEach(r => {
    const [name, activity, date, job, pay, customer] = r;
    if (!name || !activity || !pay) return;
    const amt = parseFloat(pay) || 0;
    if (amt === 0) return;

    if (!totals[name]) totals[name] = {svc:0,ins:0,plb:0,com:0,chs:0,chi:0};
    const col = classifyMPFLine(name, activity);
    totals[name][col] += amt;

    // Duplicate TGL detection
    if (activity === 'TGL Lead Sold Res') {
      const custKey = name + '|' + String(customer).split(',')[0].trim().toLowerCase();
      if (!dupsMap[custKey]) { dupsMap[custKey] = []; }
      dupsMap[custKey].push({job, amt, customer});
      if (dupsMap[custKey].length > 1) {
        flags.push({
          type: 'dup_tgl',
          emp: name,
          ref: `Job #${job}`,
          title: `Duplicate TGL Stage 2 — ${customer}`,
          detail: `TGL Lead Sold Res appears more than once for ${customer}. Jobs: ${dupsMap[custKey].map(x=>'#'+x.job).join(', ')}. One is likely a duplicate payroll entry. Verify and reverse the incorrect one.`,
          sev: 'red'
        });
      }
    }

    // Stage 2 without Stage 1 detection
    if (activity === 'TGL Lead Sold Res') {
      const custKey2 = name + '|sold|' + String(customer).split(',')[0].trim().toLowerCase();
      dupsMap[custKey2] = true;
    }
  });

  // Check for S2 without S1
  mpfRows.forEach(r => {
    const [name, activity, date, job, pay, customer] = r;
    if (activity !== 'TGL Lead Set Res') return;
    const custKey = name + '|sold|' + String(customer).split(',')[0].trim().toLowerCase();
    // S1 exists — good, remove S2 orphan concern
    delete dupsMap[custKey];
  });

  return {totals, flags};
}

// ── Utils ────────────────────────────────────────────────
function fp(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2}).format(n||0);}
function f$(n){if(!n&&n!==0)return'—';if(n===0)return'<span class="zero">—</span>';return fp(n);}
function toast(msg,dur=3200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),dur);}
function empTot(e){return(e.svc||0)+(e.ins||0)+(e.plb||0)+(e.com||0)+(e.chs||0)+(e.chi||0);}
function spiffFieldFor(mgr,empName,type){
  const isTGL = !!(type&&type.includes('TGL'));
  if(PLUMBERS.includes(empName)) return 'plb';
  if(mgr==='steven') return isTGL?'ins':'svc';
  return isTGL?'chi':'chs';
}
function deptToCol(dept){
  const d=(dept||'').toLowerCase();
  if(d.includes('plumb')) return 'plb';
  if(d.includes('commercial')) return 'com';
  if(d.includes('ch')&&d.includes('install')) return 'chi';
  if(d.includes('ch')) return 'chs';
  if(d.includes('install')||d.includes('lead')) return 'ins';
  return 'svc';
}
function payOutCarryForward(mgr,c){
  // Actually add the confirmed amount into this month's payout — otherwise
  // "Mark paid" would just dismiss the reminder without paying anyone.
  const emp=S.emps[mgr].find(e=>e.name===c.emp);
  if(!emp) return;
  const col=deptToCol(c.dept);
  emp[col]=(emp[col]||0)+c.amount;
  if(!S.spiffDetail[mgr])S.spiffDetail[mgr]={};
  if(!S.spiffDetail[mgr][c.emp])S.spiffDetail[mgr][c.emp]=[];
  S.spiffDetail[mgr][c.emp].push({
    date:'', job:c.ref, customer:c.emp, type:'Carry-forward payout',
    item:`${c.type} — confirmed paid (carried from ${c.fromMonth})`,
    spiff:c.amount, note:'Manually confirmed paid — not on this month\'s Master Pay File'
  });
}
function reversePayoutCarryForward(mgr,c){
  const emp=S.emps[mgr].find(e=>e.name===c.emp);
  if(emp){
    const col=deptToCol(c.dept);
    emp[col]=Math.max(0,(emp[col]||0)-c.amount);
  }
  const detail=(S.spiffDetail[mgr]||{})[c.emp];
  if(detail){
    const idx=detail.findIndex(d=>d.type==='Carry-forward payout'&&d.job===c.ref);
    if(idx>=0) detail.splice(idx,1);
  }
}
function stevenBonus(){return S.revenue.filter(r=>r.se&&r.actual&&r.actual>=r.goal).length*350;}
const MONTH_NAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function monthIdx(label){
  const [mon,yr]=(label||'').split(' ');
  const m=MONTH_NAMES.indexOf(mon);
  return m<0||!yr?null:parseInt(yr)*12+m;
}
function monthsAgo(fromMonthLabel){
  const from=monthIdx(fromMonthLabel), now=monthIdx(MONTH);
  return (from===null||now===null)?null:now-from;
}
function toggleDetailRow(cell){
  const next=cell.parentElement.nextElementSibling;
  if(!next) return;
  next.style.display = next.style.display==='none' ? '' : 'none';
}

// ── Load from Sheets ──────────────────────────────────────
async function loadSheets(){
  const [subs,rev,flags,mans,corrections,cfRes,jayJobLog,commLeadLog,monthStatusLog,notesLog]=await Promise.all([
    sGet('submissions!A2:F50'),
    sGet('revenue_actuals!A2:D50'),
    sGet('flags!A2:N500'),
    sGet('manual_adds!A2:I500'),
    sGet('spiff_corrections!A2:G500'),
    sGet('carry_forward_resolutions!A2:J500'),
    sGet('jay_jobs!A2:H500'),
    sGet('commlead_updates!A2:I500'),
    sGet('month_status!A2:D50'),
    sGet('manager_notes!A2:H1000'),
  ]);
  if(subs)subs.forEach(r=>{
    if(r[0]===MONTH&&r[1]){const m=r[1].toLowerCase();if(m in S.submissions){S.submissions[m]=r[2]||'not_started';S.pushback[m]=(r[4]==='pushed_back'&&r[5])?r[5]:null;}}
  });
  if(rev)rev.forEach(r=>{if(r[0]===MONTH){const row=S.revenue.find(x=>x.dept===r[1]);if(row&&r[3])row.actual=parseFloat(r[3]);}});
  if(flags)flags.forEach(r=>{
    if(r[0]!==MONTH||!r[1]||!r[2])return;
    const mgr=r[1];if(!S.flags[mgr])return;
    const fl=S.flags[mgr].find(f=>f.id===r[2]);
    if(fl){fl.disp=r[9]||'';fl.note=r[10]||'';fl.resolved=r[11]==='true';}
  });
  if(mans)mans.forEach(r=>{if(r[0]===MONTH&&r[1]&&S.manuals[r[1]])S.manuals[r[1]].push({name:r[2],reason:r[3],amount:parseFloat(r[4])||0,dept:r[5]});});
  // Load bonus approvals from Sheet (approved state only — amounts stay hardcoded)
  if(flags)flags.forEach(r=>{
    if(r[0]!==MONTH||r[1]!=='billy') return;
    const bonusId = r[2]&&r[2].startsWith('bonus-') ? r[2].replace('bonus-','') : null;
    if(bonusId){
      const b=S.bonuses.find(x=>x.id===bonusId);
      if(b&&r[11]==='true') b.approved=true;
    }
  });
  // Read Jenny's bonus total from CCS Tracker tab — cell B70
  const ccs = await sGet('ccs_tracker!B70');
  if(ccs&&ccs[0]&&ccs[0][0]){
    const jennyAmt = parseFloat(String(ccs[0][0]).replace(/[^0-9.]/g,''));
    if(jennyAmt>0){
      const jenny=S.bonuses.find(b=>b.id==='jenny');
      if(jenny) jenny.amount=jennyAmt;
    }
  }
  // Replay spiff line corrections (flag/unflag) so they survive a reload and sync
  // across PIN sessions — sAppend only ever adds rows, so the last row per
  // (mgr, empName, idx) is authoritative since sheet rows stay in append order.
  if(corrections){
    const latestCorr={};
    corrections.forEach(r=>{
      const [month,mgr,empName,idxStr,action,reason]=r;
      if(month!==MONTH||!mgr||!empName)return;
      latestCorr[`${mgr}|${empName}|${idxStr}`]={mgr,empName,idx:parseInt(idxStr),action,reason:reason||''};
    });
    Object.values(latestCorr).forEach(c=>{
      const detail=(S.spiffDetail[c.mgr]||{})[c.empName];
      if(!detail||!detail[c.idx])return;
      const line=detail[c.idx];
      const emp=S.emps[c.mgr].find(e=>e.name===c.empName);
      if(c.action==='flagged'&&!line.flagged){
        line.flagged=true;line.flagNote=c.reason;
        if(emp){const col=spiffFieldFor(c.mgr,c.empName,line.type);emp[col]=Math.max(0,(emp[col]||0)-line.spiff);}
      }else if(c.action==='unflagged'&&line.flagged){
        line.flagged=false;line.flagNote='';
        if(emp){const col=spiffFieldFor(c.mgr,c.empName,line.type);emp[col]=(emp[col]||0)+line.spiff;}
      }
    });
  }
  // Replay carry-forward resolutions (mark paid/dead) the same way — a "paid"
  // disposition also needs to re-apply the payout, since S.emps/spiffDetail
  // reset to the hardcoded baseline on every load.
  if(cfRes){
    const latestCf={};
    cfRes.forEach(r=>{
      const [month,mgr,id,emp,ref,type,amount,disposition,note]=r;
      if(month!==MONTH||!id)return;
      latestCf[id]={mgr,disposition:disposition||'',note:note||''};
    });
    Object.entries(latestCf).forEach(([id,c])=>{
      const cf=S.carryForward.find(x=>x.id===id);
      if(!cf)return;
      if(c.disposition==='paid'||c.disposition==='dead'){
        cf.resolved=true;cf.disposition=c.disposition;cf.note=c.note;
        if(c.disposition==='paid') payOutCarryForward(c.mgr,cf);
      }else{
        cf.resolved=false;cf.disposition='';cf.note='';
      }
    });
  }
  // Replay Jay Hall's equipment commission job entries — S.jayJobs otherwise
  // resets to empty on every load, same class of bug as the other two above.
  if(jayJobLog){
    const latestJJ={};
    jayJobLog.forEach(r=>{
      const [month,id,job,subtotal,accDeduct,type,action]=r;
      if(month!==MONTH||!id)return;
      latestJJ[id]={job,subtotal:parseFloat(subtotal)||0,accDeduct:parseFloat(accDeduct)||0,type,action};
    });
    S.jayJobs=Object.entries(latestJJ)
      .filter(([id,j])=>j.action==='add')
      .map(([id,j])=>({id,job:j.job,subtotal:j.subtotal,accDeduct:j.accDeduct,type:j.type}));
  }
  // Replay commercial lead status updates — same reasoning.
  if(commLeadLog){
    const latestCL={};
    commLeadLog.forEach(r=>{
      const [month,id,tech,customer,job,status,spiff,payMonth]=r;
      if(month!==MONTH||!id)return;
      latestCL[id]={status,spiff:parseFloat(spiff)||0,payMonth:payMonth||''};
    });
    Object.entries(latestCL).forEach(([id,c])=>{
      const lead=S.commLeads.find(l=>l.id===id);
      if(!lead)return;
      lead.status=c.status;lead.spiff=c.spiff;lead.payMonth=c.payMonth;
    });
  }
  // Replay month close-out status — last row for this MONTH wins.
  if(monthStatusLog){
    const rowsThisMonth=monthStatusLog.filter(r=>r[0]===MONTH);
    if(rowsThisMonth.length){
      const last=rowsThisMonth[rowsThisMonth.length-1];
      const [month,action,by,timestamp]=last;
      S.closedOut={closed:action==='closed',timestamp:timestamp||null,by:by||null};
    }
  }
  // Replay manager notes — not scoped to MONTH, since a note can be added mid-month
  // before that month's processing even starts and may not get verified until later.
  if(notesLog){
    const latestNotes={};
    notesLog.forEach(r=>{
      const [id,mgr,emp,text,author,timestamp,verified,verifiedNote]=r;
      if(!id)return;
      latestNotes[id]={id,mgr,emp,text,author,timestamp,verified:verified==='true',verifiedNote:verifiedNote||''};
    });
    S.notes=Object.values(latestNotes);
  }
}

// ── ACCOUNTING OUTPUT ─────────────────────────────────────
const DCOLS=['MB Resi Svc','MB Install Resi','MB Plumbing','MB Svc Comm','CH Service','CH Install'];
function buildRows(){
  // Build a map keyed by employee name so resolved flags roll up
  const empMap = {};

  function addToEmp(name, vals, detail, note) {
    if (!empMap[name]) empMap[name] = {name, vals:[0,0,0,0,0,0], details:[], total:0};
    vals.forEach((v,i) => empMap[name].vals[i] += (v||0));
    empMap[name].total = empMap[name].vals.reduce((a,b)=>a+b,0);
    if (detail) empMap[name].details.push(detail);
  }

  // Base employee spiffs from MPF
  [...S.emps.steven,...S.emps.caleb].forEach(e=>{
    const mgr=S.emps.steven.includes(e)?'steven':'caleb';
    const manAmt=(S.manuals[mgr]||[]).filter(m=>m.name===e.name).reduce((a,m)=>a+m.amount,0);
    const vals=[e.svc||0,e.ins||0,e.plb||0,e.com||0,e.chs||0,e.chi||0];
    const baseTotal=vals.reduce((a,b)=>a+b,0);
    if(baseTotal>0||manAmt>0){
      addToEmp(e.name, vals, null, '');
      if(manAmt>0){
        const mVals=[0,0,0,0,0,0];
        (S.manuals[mgr]||[]).filter(m=>m.name===e.name).forEach(m=>{
          addToEmp(e.name, [0,0,0,0,0,0], `Manual add: ${m.reason} — ${fp(m.amount)} (${m.dept})`, '');
        });
      }
    }
  });

  // Roll resolved flags into the employee's row
  [...S.flags.steven,...S.flags.caleb].filter(f=>f.resolved&&f.disp==='Pay this month').forEach(f=>{
    const isLead = f.title.toLowerCase().includes('lead stage 1')||f.title.toLowerCase().includes('lead stage 2');
    const isAccessory = f.title.toLowerCase().includes('accessory');
    const isCH = f.emp==='Steve Gordon'||f.emp==='Jay Hall';
    // Determine amount from flag title
    let amt = 25; // default Stage 1
    if(f.title.includes('Stage 2')) amt=75;
    if(f.title.includes('Stage 1+2')||f.title.includes('$100 total')||f.title.match(/\$100/)) amt=100;
    if(f.title.includes('CHAC-91')||f.title.includes('$300')) amt=300;
    if(f.title.includes('2x CAC3')||f.title.includes('CAC3')) amt=100;
    if(f.title.includes('CHAC-7')&&!f.title.includes('2x')) amt=50;
    if(f.note&&f.note.match(/\$(\d+)/)) amt=parseInt(f.note.match(/\$(\d+)/)[1])||amt;
    // Determine column
    let col = isLead ? (isCH?5:1) : (isCH?4:0);
    if(isAccessory && isCH) col=4;
    if(isAccessory && !isCH) col=0;
    if(f.emp==='Javi Vazquez'||f.emp==='Kyle Freeman'||f.emp==='Nick Scarpa') col=3;
    const v=[0,0,0,0,0,0]; v[col]=amt;
    addToEmp(f.emp, v, `Resolved: ${f.title} — ${fp(amt)}`, '');
  });

  // Commercial lead spiffs — roll into tech's row
  S.commLeads.filter(l=>l.status==='Sold & Completed'&&l.payMonth===MONTH).forEach(l=>{
    addToEmp(l.tech, [0,0,0,l.spiff,0,0], `Commercial lead: ${l.customer} (Job ${l.job}) — ${fp(l.spiff)}`, '');
  });

  // Carry-forward payouts — amount is already baked into the employee's base vals above
  // (payOutCarryForward mutates S.emps directly), so this only adds a traceable note,
  // not the dollar amount again — zero vals here is intentional, not a bug.
  S.carryForward.filter(c=>c.resolved&&c.disposition==='paid').forEach(c=>{
    addToEmp(c.emp, [0,0,0,0,0,0], `Carry-forward payout: ${c.type} (from ${c.fromMonth}) — ${fp(c.amount)}`, '');
  });

  // Jay commission — roll into Jay's row
  if(S.jayJobs.length>0){
    let jayComm=0;
    const jayDetails=[];
    S.jayJobs.forEach(j=>{
      const base=j.subtotal-j.accDeduct;
      let amt=0;
      if(j.type==='Commission sale (2%)'){amt=base*0.02;}
      else if(j.type==='Lead spiff Stage 1+2 ($100)'){amt=100;}
      else if(j.type==='Lead spiff Stage 1 only ($25)'){amt=25;}
      else if(j.type==='Lead spiff Stage 2 only ($75)'){amt=75;}
      jayComm+=amt;
      jayDetails.push(`Job ${j.job}: ${j.type} — ${fp(amt)}`);
    });
    if(jayComm>0){
      addToEmp('Jay Hall',[0,0,0,0,0,jayComm], `Equipment commission: ${jayDetails.join('; ')}`, '');
    }
  }

  // Steven performance bonus
  S.revenue.filter(r=>r.se&&r.actual&&r.actual>=r.goal).forEach(r=>{
    const col=r.dept.includes('Residential')?0:r.dept.includes('Commercial')?3:r.dept.includes('Plumbing')?2:0;
    const v=[0,0,0,0,0,0];v[col]=350;
    addToEmp('Steven (performance bonus)',v,`Performance bonus: ${r.dept} goal met — $350`,'');
  });

  // Approved bonuses
  S.bonuses.filter(b=>b.approved).forEach(b=>{
    addToEmp(b.name,[0,0,0,0,0,0],`${b.type}: ${fp(b.amount)}`,'');
    if(!empMap[b.name]) empMap[b.name]={name:b.name,vals:[0,0,0,0,0,0],details:[],total:0};
    empMap[b.name].total+=b.amount;
    empMap[b.name].bonusAmt=(empMap[b.name].bonusAmt||0)+b.amount;
    empMap[b.name].bonusNote=b.type;
  });

  // Office membership spiffs
  S.officeMems.forEach(m=>{
    const v=[0,0,0,0,0,0];
    if(m.dept==='MB Residential Service')v[0]=m.total;
    else if(m.dept==='MB Plumbing')v[2]=m.total;
    else if(m.dept==='CH Service')v[4]=m.total;
    if(m.total>0) addToEmp(m.name,v,`Membership spiffs: ${fp(m.total)}`,'');
  });

  return Object.values(empMap).filter(r=>r.total>0);
}

async function addManual(mgr){
  if(guardClosed())return;
  const name=document.getElementById('m-emp').value;
  const reason=document.getElementById('m-rsn').value.trim();
  const amount=parseFloat(document.getElementById('m-amt').value)||0;
  const dept=document.getElementById('m-dept').value;
  if(!reason||amount<=0){toast('Please enter a reason and amount.');return;}
  S.manuals[mgr].push({name,reason,amount,dept});
  await sAppend('manual_adds',[[MONTH,mgr,name,reason,amount,dept,S.role,new Date().toISOString(),'pending']]);
  toast('Manual spiff added');rTeam(mgr);
}
function removeManual(mgr,i){if(guardClosed())return;S.manuals[mgr].splice(i,1);rTeam(mgr);}

async function addNote(mgr){
  const emp=document.getElementById(`note-emp-${mgr}`).value;
  const textEl=document.getElementById(`note-text-${mgr}`);
  const text=textEl.value.trim();
  if(!text){toast('Please enter a note.');return;}
  const id='note_'+Date.now();
  const author=S.role;
  const timestamp=new Date().toISOString();
  S.notes.push({id,mgr,emp,text,author,timestamp,verified:false,verifiedNote:''});
  textEl.value='';
  await sAppend('manager_notes',[[id,mgr,emp,text,author,timestamp,'false','']]);
  toast('Note added');
  rTeam(mgr);
}
async function verifyNote(id){
  const n=S.notes.find(x=>x.id===id);
  if(!n)return;
  n.verified=true;n.verifiedNote='Verified during processing';
  await sAppend('manager_notes',[[id,n.mgr,n.emp,n.text,n.author,n.timestamp,'true',n.verifiedNote]]);
  toast('Marked verified.');
  rTeam(n.mgr);
}
async function unverifyNote(id){
  const n=S.notes.find(x=>x.id===id);
  if(!n)return;
  n.verified=false;n.verifiedNote='';
  await sAppend('manager_notes',[[id,n.mgr,n.emp,n.text,n.author,n.timestamp,'false','']]);
  toast('Reopened.');
  rTeam(n.mgr);
}
async function submitWorkbook(){
  if(guardClosed())return;
  const mgr=S.role;
  if(S.flags[mgr].filter(f=>!f.resolved).length>0)return;
  S.submissions[mgr]='submitted';
  await sAppend('submissions',[[MONTH,mgr,'submitted',new Date().toISOString(),'','']]);
  toast('Submitted to Billy');rTeam(mgr);
}

async function searchLedger(){
  const q=(document.getElementById('lookup-q').value||'').trim().toLowerCase();

  if(!q){toast('Enter a job number or employee name.');return;}
  resultsEl.innerHTML='<div style="font-size:.82rem;color:#999">Searching…</div>';
  const rows=await sGet('spiff_ledger!A2:I5000');
  if(!rows){resultsEl.innerHTML='<div style="font-size:.82rem;color:#991b1b">Could not reach the ledger — try again in a moment.</div>';return;}
  const matches=rows.filter(r=>{
    const [month,mgr,employee,job,customer,type,item,amount,source]=r;
    return (job&&String(job).toLowerCase().includes(q))||(employee&&employee.toLowerCase().includes(q))||(customer&&customer.toLowerCase().includes(q));
  });
  if(!matches.length){resultsEl.innerHTML='<div style="font-size:.82rem;color:#999">No matches found.</div>';return;}
  resultsEl.innerHTML=`<div class="aw"><table class="at">
    <thead><tr><th style="text-align:left">Month</th><th style="text-align:left">Employee</th><th style="text-align:left">Job</th><th style="text-align:left">Customer</th><th style="text-align:left">Type / item</th><th>Amount</th><th style="text-align:left">Source</th></tr></thead>

      const [month,mgr,employee,job,customer,type,item,amount,source]=r;
      return `<tr><td style="text-align:left">${month}</td><td style="text-align:left">${employee}</td><td style="text-align:left;font-family:'DM Mono',monospace">${job||'—'}</td><td style="text-align:left">${customer||'—'}</td><td style="text-align:left">${item||type||''}</td><td>${fp(parseFloat(amount)||0)}</td><td style="text-align:left;font-size:.68rem;color:#999">${source||''}</td></tr>`;
    }).join('')}</tbody>
  </table></div>
  <div style="font-size:.72rem;color:#999;margin-top:.5rem">${matches.length} result${matches.length!==1?'s':''}</div>`;
}

async function updateCommLead(id, status){
  if(guardClosed())return;
  const lead=S.commLeads.find(l=>l.id===id);
  if(!lead) return;
  lead.prevStatus = lead.status; // save for undo
  lead.status=status;
  if(status==='Sold & Completed'){
    lead.spiff=100; lead.payMonth=MONTH;
    toast(`\$100 spiff due to ${lead.tech} — will appear in accounting output.`);
  }
  if(status==='Did Not Sell — Close Lead'){lead.spiff=0;}
  rCommLeads();
  await sAppend('commlead_updates',[[MONTH,id,lead.tech,lead.customer,lead.job,status,lead.spiff,lead.payMonth,new Date().toISOString()]]);
}

async function undoCommLead(id){
  if(guardClosed())return;
  const lead=S.commLeads.find(l=>l.id===id);
  if(!lead||!lead.prevStatus) return;
  lead.status=lead.prevStatus;
  lead.prevStatus=null;
  if(lead.status!=='Sold & Completed'){lead.spiff=0;lead.payMonth='';}
  toast('Status reverted.');
  rCommLeads();
  await sAppend('commlead_updates',[[MONTH,id,lead.tech,lead.customer,lead.job,lead.status,lead.spiff,lead.payMonth,new Date().toISOString()]]);
}

}

        ${c.resolved?`<span class="risub" style="color:${c.disposition==='paid'?'#065f46':'#991b1b'}">${c.disposition==='paid'?'✓ Paid this month':'✕ Marked dead — '+c.note}</span>`:''}
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
        <span style="font-weight:600;font-family:'DM Mono',monospace">${fp(c.amount)}</span>
        ${c.resolved?
          `<button onclick="undoCarryForward('${mgr}','${c.id}')" style="font-size:.65rem;padding:2px 8px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;color:#666">Undo</button>`
          :`<select id="cf-disp-${c.id}" style="font-size:.7rem;padding:3px 6px;border:1px solid #ddd;border-radius:6px;background:#fff">
              <option value="">Select…</option>
              <option value="paid">Pay this month</option>
              <option value="dead">Mark dead — didn't convert</option>
            </select>
            <input type="text" id="cf-note-${c.id}" placeholder="Note (required for dead)" style="font-size:.7rem;padding:3px 6px;border:1px solid #ddd;border-radius:6px;width:150px">
            <button class="btn bsm" onclick="resolveCarryForward('${mgr}','${c.id}')">Resolve</button>`}
      </div>
    </div>`;
    }).join('')}
    <div style="font-size:.7rem;color:#999;margin-top:.5rem">⚠ These are cross-checked against each month's Master Pay File automatically. Mark one "paid" or "dead" only if you've confirmed it outside that automatic check (e.g. a manual payroll adjustment, or the lead is confirmed dead and should stop carrying forward).</div>
  </div>`:''}
  ${flags.map(f=>`<div class="fb ${f.sev} ${f.resolved?'done':''}">
    <div class="fmeta">${f.emp} · ${f.ref}</div>
    <div class="ftitle">${f.title}</div>
    ${f.resolved?`
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="badge ${f.disp==='Pay this month'?'bok':f.disp==='Pay next month'?'binfo':'bdanger'}">${f.disp}</span>
        ${f.note?`<span style="font-size:.72rem;color:#999">${f.note}</span>`:''}
        <button onclick="undoFlag('${mgr}','${f.id}')" style="font-size:.65rem;padding:2px 8px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;color:#666">Undo</button>
      </div>`:`
      <div class="fdetail">${f.detail}</div>
      <div class="factions">
        <select onchange="S.flags['${mgr}'].find(x=>x.id==='${f.id}').disp=this.value">
          <option value="">Select action…</option>
          <option>Pay this month</option>
          <option>Pay next month</option>
          <option>Not paid</option>
          <option>Add manual spiff below</option>
        </select>
        <textarea placeholder="Note — required for Not paid…" onchange="S.flags['${mgr}'].find(x=>x.id==='${f.id}').note=this.value"></textarea>
        <button class="btn btnp bsm" onclick="resolveFlag('${mgr}','${f.id}')">Resolve</button>
      </div>`}
  </div>`).join('')}
  ${!flags.length?`<div class="card" style="text-align:center;color:#999;font-size:.85rem;padding:2rem">No flags for your team this month.</div>`:''}`;
}
function renderJayJobs(){
  const list=document.getElementById('jay-jobs-list');
  const totEl=document.getElementById('jay-total');
  if(!list||!totEl)return;
  let commission=0;
  const rows=S.jayJobs.map((j,i)=>{
    let amt=0;
    const base=j.subtotal-j.accDeduct;
    if(j.type==='Commission sale (2%)'){amt=base*0.02;}
    else if(j.type==='Lead spiff Stage 1+2 ($100)'){amt=100;}
    else if(j.type==='Lead spiff Stage 1 only ($25)'){amt=25;}
    else if(j.type==='Lead spiff Stage 2 only ($75)'){amt=75;}
    commission+=amt;
    return `<div style="display:flex;justify-content:space-between;align-items:flex-start;font-size:.78rem;padding:6px 0;border-top:1px solid #F0EDE8">
      <div>
        <span style="font-family:'DM Mono',monospace;color:#999">Job ${j.job}</span>
        <span style="margin-left:8px">${j.type}</span>
        ${j.accDeduct>0?`<span style="font-size:.7rem;color:#999;margin-left:6px">Subtotal ${fp(j.subtotal)} − accessories ${fp(j.accDeduct)} = base ${fp(base)}</span>`:`<span style="font-size:.7rem;color:#999;margin-left:6px">Subtotal ${fp(j.subtotal)}</span>`}
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <strong style="font-family:'DM Mono',monospace">${fp(amt)}</strong>
        <button class="btn bsm" onclick="removeJayJob(${i})">Remove</button>
      </div>
    </div>`;
  }).join('');
  list.innerHTML=rows;
  // Update Jay's commission in emps
  const jay=S.emps.caleb.find(e=>e.name==='Jay Hall');
  if(jay){jay.jayCommission=commission;}
  totEl.innerHTML=`<span style="font-size:.82rem">Jay Hall commission total: <strong style="font-family:'DM Mono',monospace">${fp(commission)}</strong> &nbsp;·&nbsp; Plus service spiffs: <strong style="font-family:'DM Mono',monospace">${fp(jay?jay.chs:0)}</strong> &nbsp;·&nbsp; <strong>Grand total: ${fp(commission+(jay?jay.chs:0))}</strong></span>`;
}

async function flagSpiffLine(mgr,empName,idx){
  if(guardClosed())return;
  const reasonId=`flag-reason-${mgr}-${empName.replace(/\s/g,'_')}-${idx}`;
  const reasonEl=document.getElementById(reasonId);
  const reason=reasonEl?reasonEl.value.trim():'';
  if(!reason){toast('Please enter a reason before marking incorrect.');return;}
  const detail=(S.spiffDetail[mgr]||{})[empName];
  if(!detail||!detail[idx])return;
  detail[idx].flagged=true;
  detail[idx].flagNote=reason;
  // Subtract from employee total — route to the correct field based on
  // the actual line type/department, not just which manager owns the emp
  const emp=S.emps[mgr].find(e=>e.name===empName);
  if(emp){
    const col=spiffFieldFor(mgr,empName,detail[idx].type);
    emp[col]=Math.max(0,(emp[col]||0)-detail[idx].spiff);
  }
  // Persist so the correction survives a reload and syncs to other PIN sessions —
  // without this, marking a line incorrect only ever mutated in-memory state.
  await sAppend('spiff_corrections',[[MONTH,mgr,empName,String(idx),'flagged',reason,new Date().toISOString()]]);
  toast('Line flagged — excluded from totals. Noted for payroll reversal.');
  rTeam(mgr);
}

async function unflagSpiffLine(mgr,empName,idx){
  if(guardClosed())return;
  const detail=(S.spiffDetail[mgr]||{})[empName];
  if(!detail||!detail[idx])return;
  const wasSpiff=detail[idx].spiff;
  detail[idx].flagged=false;
  detail[idx].flagNote='';
  // Add back to employee total — same routing logic as flagSpiffLine
  const emp=S.emps[mgr].find(e=>e.name===empName);
  if(emp){
    const col=spiffFieldFor(mgr,empName,detail[idx].type);
    emp[col]=(emp[col]||0)+wasSpiff;
  }
  await sAppend('spiff_corrections',[[MONTH,mgr,empName,String(idx),'unflagged','',new Date().toISOString()]]);
  toast('Flag removed — spiff restored to total.');
  rTeam(mgr);
}

async function addJayJob(){
  if(guardClosed())return;
  const job=document.getElementById('jay-job').value.trim();
  const sub=parseFloat(document.getElementById('jay-sub').value)||0;
  const acc=parseFloat(document.getElementById('jay-acc').value)||0;
  const type=document.getElementById('jay-type').value;
  if(!job||sub<=0){toast('Please enter a job number and subtotal.');return;}
  const id='jj_'+Date.now();
  S.jayJobs.push({id,job,subtotal:sub,accDeduct:acc,type});
  document.getElementById('jay-job').value='';
  document.getElementById('jay-sub').value='';
  document.getElementById('jay-acc').value='';
  renderJayJobs();
  await sAppend('jay_jobs',[[MONTH,id,job,sub,acc,type,'add',new Date().toISOString()]]);
  toast('Job added');
}

async function removeJayJob(i){
  if(guardClosed())return;
  const j=S.jayJobs[i];
  S.jayJobs.splice(i,1);
  renderJayJobs();
  if(j) await sAppend('jay_jobs',[[MONTH,j.id||'',j.job,j.subtotal,j.accDeduct,j.type,'remove',new Date().toISOString()]]);
}

function renderAfterUndo(mgr){
  // Re-render whichever view is active
  if(document.querySelector('.nb.on')&&document.querySelector('.nb.on').dataset.v==='review') rReview();
  else rOverview();
}

async function undoFlag(mgr,id){
  if(guardClosed())return;
  const f=S.flags[mgr].find(x=>x.id===id);
  if(!f) return;
  f.resolved=false; f.disp=''; f.note='';
  // Write undo to sheet — new row overrides previous resolution
  await sAppend('flags',[[MONTH,mgr,id,f.sev,f.sev,f.emp,f.ref,'',f.detail,'','','false',new Date().toISOString()]]);
  toast('Flag re-opened.');
  rFlags(mgr);
  // Update submit button
  const btn=document.querySelector('button[onclick="submitWorkbook()"]');
  if(btn){btn.textContent=`1 flag needs resolution`;btn.style.background='#ccc';btn.style.cursor='not-allowed';}
}

async function resolveFlag(mgr,id){
  if(guardClosed())return;
  const f=S.flags[mgr].find(x=>x.id===id);
  if(!f||!f.disp){toast('Please select an action first.');return;}
  if(f.disp==='Not paid'&&!f.note.trim()){toast("Please add a note explaining why.");return;}
  f.resolved=true;
  await sAppend('flags',[[MONTH,mgr,id,f.sev,f.sev,f.emp,f.ref,'',f.detail,f.disp,f.note,'true',new Date().toISOString()]]);
  if(f.disp==='Pay next month')
    await sAppend('carry_forward',[[MONTH,NEXT_M,f.emp,f.ref,'',f.title,'','',f.note||f.detail,'pending','']]);
  toast(f.disp==='Pay next month'?'Carried forward to June.':'Flag resolved.');
  rFlags(mgr);
  const btn=document.querySelector('button[onclick="submitWorkbook()"]');
  if(btn&&S.flags[mgr].filter(x=>!x.resolved).length===0){btn.textContent='Submit to Billy';btn.style.background='#1a1a1a';btn.style.cursor='pointer';}
}

async function resolveCarryForward(mgr,id){
  if(guardClosed())return;
  const c=S.carryForward.find(x=>x.id===id);
  if(!c) return;
  const dispEl=document.getElementById(`cf-disp-${id}`);
  const noteEl=document.getElementById(`cf-note-${id}`);
  const disp=dispEl?dispEl.value:'';
  const note=noteEl?noteEl.value.trim():'';
  if(!disp){toast('Please select paid or dead.');return;}
  if(disp==='dead'&&!note){toast('Please add a note explaining why.');return;}
  c.resolved=true; c.disposition=disp; c.note=note;
  if(disp==='paid') payOutCarryForward(mgr,c);
  await sAppend('carry_forward_resolutions',[[MONTH,mgr,id,c.emp,c.ref,c.type,c.amount,disp,note,new Date().toISOString()]]);
  toast(disp==='paid'?`$${c.amount} added to ${c.emp}'s total for ${MONTH}.`:'Marked dead — will not carry forward again.');
  rFlags(mgr);
}

async function undoCarryForward(mgr,id){
  if(guardClosed())return;
  const c=S.carryForward.find(x=>x.id===id);
  if(!c) return;
  if(c.disposition==='paid') reversePayoutCarryForward(mgr,c);
  c.resolved=false; c.disposition=''; c.note='';
  await sAppend('carry_forward_resolutions',[[MONTH,mgr,id,c.emp,c.ref,c.type,c.amount,'','',new Date().toISOString()]]);
  toast('Reopened — will carry forward again next month.');
  rFlags(mgr);
}

function rerenderCurrentView(){
  const activeBtn=document.querySelector('.nb.on');
  if(activeBtn&&RENDERS[activeBtn.dataset.v])RENDERS[activeBtn.dataset.v]();
}

// ── Month close-out ──────────────────────────────────────
function isClosed(){return !!(S.closedOut&&S.closedOut.closed);}
function guardClosed(){
  if(isClosed()){toast(`${MONTH} is closed out — reopen it first to make changes.`);return true;}
  return false;
}
async function closeOutMonth(){
  if(!confirm(`Close out ${MONTH}? This locks all manual adds, flag/carry-forward resolution, bonus approval, and revenue entry until reopened.`))return;
  S.closedOut={closed:true,timestamp:new Date().toISOString(),by:S.role};
  await sAppend('month_status',[[MONTH,'closed',S.role,new Date().toISOString()]]);
  toast('Month closed out — locked for editing.');
  rerenderCurrentView();
}
async function reopenMonth(){
  if(!confirm(`Reopen ${MONTH} for editing?`))return;
  S.closedOut={closed:false,timestamp:new Date().toISOString(),by:S.role};
  await sAppend('month_status',[[MONTH,'reopened',S.role,new Date().toISOString()]]);
  toast('Month reopened for editing.');
  rerenderCurrentView();
}

showPin();
// Try Sheet connection in background
(async()=>{
  const badge=document.getElementById('conn-badge');
  try{
    const timeout=new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),8000));
    const connect=(async()=>{await loadSheets();})();
    await Promise.race([connect,timeout]);
    badge.textContent='Connected';badge.className='conn conn-ok';CONN_OK=true;
    // loadSheets() runs independently of PIN entry/navigation — if a manager was
    // already viewing a tab before this resolved, re-render so synced data
    // (corrections, resolutions, flag states, etc) actually shows up.
    rerenderCurrentView();
  }catch(e){
    badge.textContent='Offline — saves disabled';badge.className='conn conn-err';
    console.warn('Sheet offline:',e.message);
  }
})();
